<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>California 3D Satellite Relief Atlas</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/light/main.css" />
  <style>
    html, body, #viewDiv { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #e9eff1; }
    #viewDiv { position: fixed; inset: 0; }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      max-width: 580px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.9);
      background: rgba(255,255,255,.8);
      box-shadow: 0 10px 30px rgba(25,35,45,.14);
      backdrop-filter: blur(7px);
      padding: 12px 14px;
      color: #243241;
    }
    .hud h1 { margin: 0 0 5px; font: 500 34px/1.05 "Georgia", "Times New Roman", serif; letter-spacing: .01em; }
    .hud p { margin: 0; font: 13px/1.35 Inter, system-ui, sans-serif; color: #546271; }
    .chip {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid #b7cfdf;
      background: #e2eff8;
      color: #2a4e65;
      font: 11px/1.1 Inter, system-ui, sans-serif;
    }
    .overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(120vmax 95vmax at 19% 64%, rgba(183,231,255,.36), rgba(183,231,255,.08) 42%, rgba(255,255,255,.12) 100%),
        linear-gradient(180deg, rgba(255,255,255,.2), rgba(255,255,255,.02));
      mix-blend-mode: screen;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div id="viewDiv"></div>
  <div class="overlay"></div>
  <section class="hud">
    <h1>California 3D Relief & River Atlas</h1>
    <p>High-detail satellite + true terrain elevation rendering for the full state, with bright styling and softly faded neighboring regions.</p>
    <span class="chip">Drag to orbit • right-drag tilt • wheel/pinch zoom • full CA framed</span>
  </section>

  <script src="https://js.arcgis.com/4.30/"></script>
  <script>
    require([
      "esri/Map",
      "esri/views/SceneView",
      "esri/layers/FeatureLayer",
      "esri/layers/GraphicsLayer",
      "esri/Graphic",
      "esri/geometry/Polygon"
    ], (Map, SceneView, FeatureLayer, GraphicsLayer, Graphic, Polygon) => {

      const caCoords = [[
        [-124.4096,42.0003],[-123.2333,42.0061],[-122.3789,42.0115],[-121.0370,41.9954],[-120.0019,41.9942],
        [-120.0009,39.0002],[-119.9992,38.2146],[-118.7148,37.2361],[-117.4989,36.1123],[-114.6336,34.8730],
        [-114.6349,34.2582],[-114.5352,33.9334],[-114.7214,33.4335],[-114.6616,33.0352],[-114.5249,32.7551],
        [-117.1278,32.5369],[-117.2468,32.6683],[-118.4106,33.7403],[-119.0019,34.4620],[-120.4543,34.4480],
        [-120.9126,34.9693],[-121.7979,36.2940],[-122.5167,37.5050],[-122.9346,38.1562],[-123.7138,39.3762],
        [-124.2116,40.8215],[-124.4096,42.0003]
      ]];

      const map = new Map({
        basemap: "satellite",
        ground: "world-elevation"
      });

      const view = new SceneView({
        container: "viewDiv",
        map,
        qualityProfile: "high",
        viewingMode: "global",
        environment: {
          atmosphereEnabled: true,
          starsEnabled: false,
          lighting: {
            directShadowsEnabled: true,
            ambientOcclusionEnabled: true,
            date: new Date("2026-06-15T18:00:00Z")
          }
        },
        camera: {
          position: { longitude: -119.4, latitude: 36.8, z: 950000 },
          heading: 340,
          tilt: 58
        },
        constraints: {
          altitude: { min: 160000, max: 3500000 }
        },
        highlightOptions: { color: [255, 255, 255, 0.95], haloOpacity: 1, fillOpacity: 0.1 }
      });

      const fadeLayer = new GraphicsLayer();
      map.add(fadeLayer);

      const neighPolys = [
        [[-124.8,46],[-116.2,46],[-116.2,42],[-124.5,42],[-124.8,46]], // OR
        [[-120.1,42],[-114,42],[-114,35],[-114.6,35],[-118.7,37.2],[-120,39],[-120.1,42]], // NV
        [[-114.9,37],[-109,37],[-109,31.2],[-114.6,31.2],[-114.6,35],[-114.9,37]], // AZ
        [[-117.6,32.55],[-113,32.55],[-113,28.5],[-117.6,28.5],[-117.6,32.55]] // Mexico north
      ];

      neighPolys.forEach(ring => {
        fadeLayer.add(new Graphic({
          geometry: new Polygon({ rings: [ring], spatialReference: { wkid: 4326 } }),
          symbol: {
            type: "simple-fill",
            color: [245, 242, 235, 0.5],
            outline: { color: [255,255,255,0.32], width: 1 }
          }
        }));
      });

      fadeLayer.add(new Graphic({
        geometry: new Polygon({ rings: caCoords, spatialReference: { wkid: 4326 } }),
        symbol: {
          type: "simple-fill",
          color: [0,0,0,0],
          outline: { color: [255,255,255,0.95], width: 2.2 }
        }
      }));

      const rivers = new FeatureLayer({
        url: "https://services9.arcgis.com/RHVPKKiFTONKtxq3/ArcGIS/rest/services/USA_Rivers_and_Streams/FeatureServer/0",
        title: "Rivers and Streams",
        definitionExpression: "STATE_NAME = 'California' OR STATE_ABBR = 'CA'",
        elevationInfo: { mode: "on-the-ground" },
        renderer: {
          type: "simple",
          symbol: {
            type: "simple-line",
            color: [85, 178, 228, 0.78],
            width: 1.3,
            cap: "round",
            join: "round"
          }
        },
        blendMode: "screen",
        opacity: 0.86
      });
      map.add(rivers);

      const riversGlow = new FeatureLayer({
        url: "https://services9.arcgis.com/RHVPKKiFTONKtxq3/ArcGIS/rest/services/USA_Rivers_and_Streams/FeatureServer/0",
        definitionExpression: "STATE_NAME = 'California' OR STATE_ABBR = 'CA'",
        elevationInfo: { mode: "on-the-ground" },
        renderer: {
          type: "simple",
          symbol: { type: "simple-line", color: [215, 244, 255, 0.68], width: 0.6, cap: "round", join: "round" }
        },
        blendMode: "plus",
        opacity: 0.9
      });
      map.add(riversGlow);

      view.when(() => {
        view.goTo({
          target: new Polygon({ rings: caCoords, spatialReference: { wkid: 4326 } }),
          heading: 340,
          tilt: 58,
          scale: 7600000
        }, { duration: 0 });
      });
    });
  </script>
</body>
</html>
